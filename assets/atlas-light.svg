<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
     role="img" aria-label="PromptAudit architecture: lockfiles enter the resolver to produce a flat transitive package list, the fetcher pulls each package's README and metadata into a local cache, the scanner runs the curated prompt-injection corpus over the cache, and the report emits findings with a CI exit code">
  <defs>
    <marker id="ah-l" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#B9B9C2"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" fill="#F5F5F7"/>

  <!-- offline frame -->
  <rect x="24" y="64" width="832" height="272" rx="18" fill="none" stroke="#D14343" stroke-opacity="0.40" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="44" y="86" font-size="13" font-weight="600" fill="#A22F2F">No LLM · no inference cost · regex + curated corpus</text>

  <!-- title -->
  <text x="44" y="44" font-size="15" font-weight="700" fill="#1D1D1F">PromptAudit pipeline</text>

  <!-- connectors -->
  <g stroke="#C9C9D0" stroke-width="1.6" fill="none">
    <line x1="200" y1="200" x2="244" y2="200" marker-end="url(#ah-l)"/>
    <line x1="396" y1="200" x2="440" y2="200" marker-end="url(#ah-l)"/>
    <line x1="592" y1="200" x2="636" y2="200" marker-end="url(#ah-l)"/>
  </g>
  <!-- corpus feeds scanner -->
  <g stroke="#D97706" stroke-width="1.6" fill="none" stroke-dasharray="4 4">
    <line x1="514" y1="290" x2="514" y2="252" marker-end="url(#ah-l)"/>
  </g>

  <!-- Lockfiles (input) -->
  <g>
    <rect x="44" y="150" width="156" height="100" rx="15" fill="#0071E3" fill-opacity="0.10" stroke="#0071E3" stroke-width="1.5"/>
    <text x="122" y="178" text-anchor="middle" font-size="14" font-weight="600" fill="#0A4F9E">Lockfiles</text>
    <text x="122" y="200" text-anchor="middle" font-size="11" fill="#0A4F9E">package-lock.json</text>
    <text x="122" y="216" text-anchor="middle" font-size="11" fill="#0A4F9E">poetry.lock</text>
    <text x="122" y="232" text-anchor="middle" font-size="11" fill="#0A4F9E">requirements.txt</text>
  </g>

  <!-- Resolver -->
  <g>
    <rect x="244" y="150" width="152" height="100" rx="15" fill="#5E5CE6" fill-opacity="0.10" stroke="#5E5CE6" stroke-width="1.5"/>
    <text x="320" y="178" text-anchor="middle" font-size="14" font-weight="600" fill="#4B3FC4">Resolver</text>
    <text x="320" y="202" text-anchor="middle" font-size="11" fill="#4B3FC4">walk transitive</text>
    <text x="320" y="218" text-anchor="middle" font-size="11" fill="#4B3FC4">tree → flat list</text>
    <text x="320" y="237" text-anchor="middle" font-size="10.5" fill="#6E6E73">npm · PyPI</text>
  </g>

  <!-- Fetcher -->
  <g>
    <rect x="440" y="150" width="152" height="100" rx="15" fill="#5E5CE6" fill-opacity="0.10" stroke="#5E5CE6" stroke-width="1.5"/>
    <text x="516" y="178" text-anchor="middle" font-size="14" font-weight="600" fill="#4B3FC4">Fetcher</text>
    <text x="516" y="202" text-anchor="middle" font-size="11" fill="#4B3FC4">README · summary</text>
    <text x="516" y="218" text-anchor="middle" font-size="11" fill="#4B3FC4">error strings</text>
    <text x="516" y="237" text-anchor="middle" font-size="10.5" fill="#6E6E73">→ local cache</text>
  </g>

  <!-- Scanner -->
  <g>
    <rect x="636" y="150" width="156" height="100" rx="15" fill="#D14343" fill-opacity="0.12" stroke="#D14343" stroke-width="1.6"/>
    <text x="714" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#A22F2F">Scanner</text>
    <text x="714" y="202" text-anchor="middle" font-size="11" fill="#A22F2F">regex match over</text>
    <text x="714" y="218" text-anchor="middle" font-size="11" fill="#A22F2F">cached text</text>
    <text x="714" y="237" text-anchor="middle" font-size="10.5" fill="#6E6E73">→ Findings</text>
  </g>

  <!-- Corpus (feeds scanner) -->
  <g>
    <rect x="430" y="290" width="168" height="46" rx="13" fill="#D97706" fill-opacity="0.12" stroke="#D97706" stroke-width="1.4"/>
    <text x="514" y="310" text-anchor="middle" font-size="12.5" font-weight="600" fill="#9A5B00">Curated corpus</text>
    <text x="514" y="326" text-anchor="middle" font-size="10.5" fill="#9A5B00">30+ seed payloads · YAML</text>
  </g>

  <!-- Report (output) -->
  <g>
    <rect x="636" y="276" width="156" height="60" rx="13" fill="#10A37F" fill-opacity="0.10" stroke="#10A37F" stroke-width="1.5"/>
    <text x="714" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#0B6B53">Report</text>
    <text x="714" y="320" text-anchor="middle" font-size="10.5" fill="#0B6B53">rich · --json · exit 1</text>
  </g>
  <g stroke="#C9C9D0" stroke-width="1.6" fill="none">
    <line x1="714" y1="250" x2="714" y2="270" marker-end="url(#ah-l)"/>
  </g>
</svg>
