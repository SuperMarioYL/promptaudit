<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" width="880" height="200"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
     role="img" aria-label="PromptAudit — catch prompt-injection payloads before your Coding Agent runs them">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1037"/>
      <stop offset="0.55" stop-color="#2a1a5e"/>
      <stop offset="1" stop-color="#0f1d4d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8A6CF0"/>
      <stop offset="1" stop-color="#0071E3"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="880" height="200" rx="18" fill="url(#bg)"/>

  <!-- faint scan grid -->
  <g opacity="0.10" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="50" x2="880" y2="50"/>
    <line x1="0" y1="100" x2="880" y2="100"/>
    <line x1="0" y1="150" x2="880" y2="150"/>
  </g>

  <!-- shield mark -->
  <g transform="translate(60,52)">
    <circle cx="48" cy="48" r="60" fill="#8A6CF0" opacity="0.18" filter="url(#soft)"/>
    <path d="M48 6 L86 22 V52 C86 78 68 92 48 100 C28 92 10 78 10 52 V22 Z"
          fill="none" stroke="url(#accent)" stroke-width="4"/>
    <path d="M30 50 l12 13 l26 -30" fill="none" stroke="#7CF0C2" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="200" y="86" fill="#ffffff" font-size="48" font-weight="800" letter-spacing="-1">PromptAudit</text>
  <text x="202" y="120" fill="#C9C2F2" font-size="17" font-weight="500">
    Catch prompt-injection payloads before your Coding Agent runs them.
  </text>

  <!-- ecosystem chips -->
  <g font-size="13" font-weight="600" text-anchor="middle">
    <g transform="translate(202,142)">
      <rect width="70" height="26" rx="13" fill="#8A6CF0" opacity="0.22"/>
      <text x="35" y="18" fill="#D8CFFF">npm</text>
    </g>
    <g transform="translate(282,142)">
      <rect width="70" height="26" rx="13" fill="#0071E3" opacity="0.22"/>
      <text x="35" y="18" fill="#BFE0FF">PyPI</text>
    </g>
    <g transform="translate(362,142)">
      <rect width="90" height="26" rx="13" fill="#7C3AED" opacity="0.25"/>
      <text x="45" y="18" fill="#E5D8FF">MCP-ready</text>
    </g>
    <g transform="translate(462,142)">
      <rect width="118" height="26" rx="13" fill="#1f9d62" opacity="0.25"/>
      <text x="59" y="18" fill="#B7F0D2">no LLM required</text>
    </g>
  </g>
</svg>
